                      id:
                        type: string
                        description: The event id. Must be unique within the dataset. If not set, a UUIDv4 will be generated at ingestion time.
                        example: "beb21d99-a8c9-4dc0-8a69-5d684cc41e6c"
                      dimensions:
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                              example: "project_id"
                              description: If the type is `fixed`, the key must
                                be a valid fixed value. See the
                                [DataHub API Guide](https://developer.doit.com/docs/datahub-api) for more information.
                            type:
                              type: string
                              description: The dimension type.
                              x-type: string
                              enum:
                                - fixed
                                - label
                                - project_label
                                - system_label
                            value:
                              oneOf:
                                - type: string
                                - type: boolean
                              example: "production-project"
                      time:
                        type: string
                        format: date-time
                        description: The timestamp of the event in RFC3339 format.
                        example: "2024-03-10T23:00:00Z"
                      metrics:
                        type: array
                        items:
                          type: object
                          properties:
                            value:
                              type: number
                              format: double
                              description: The value of the metric.
                              example: 10.5
                            type:
                              type: string
                              description: 'The type of the metric. If you
                                choose "cost" or "usage", it will map to the
                                basic "Cost" or "Usage" metric in Cloud
                                Analytics reports. You can also use this field
                                to define custom metric types, such as
                                "working_hours", "ride", etc.'
                              example: "cost"
      responses:
        "201":
          description: OK - Ingestion succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Ingestion success"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "500":
          $ref: "#/components/responses/500"
  /datahub/v1/events/delete:
    post:
      tags:
        - DataHub
      summary: Delete specific events
      description: >-
        Deletes specific events using filters. Note that the two filters, `eventIds` and `time ranges`, are mutually exclusive.
      operationId: deleteDatahubEventsByFilter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Exactly one of "eventIds" or "time ranges" must be provided.
              required:
                - dataset
              properties:
                dataset:
                  type: string
                  description: The dataset (provider) of the events to be deleted.
                  example: "Datadog"
                eventIds:
                  type: array
                  items:
                    type: string
                    description: Id of the event to be deleted.
                    example: "beb21d99-a8c9-4dc0-8a69-5d684cc41e6c"
                startTime:
                  type: string
                  format: date-time
                  description: The start timestamp of the time range in RFC3339 format.
                  example: "2024-03-10T23:00:00Z"
                endTime:
                  type: string
                  format: date-time
                  description: The end timestamp of the time range in RFC3339 format.
                  example: "2024-03-12T23:00:00Z"
              minProperties: 1
              maxProperties: 1
      responses:
        "200":
          description: OK - Events deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Delete success"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "500":
          $ref: "#/components/responses/500"
  /datahub/v1/datasets:
