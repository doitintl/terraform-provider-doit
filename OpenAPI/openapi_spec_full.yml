        type:
          $ref: "#/components/schemas/DimensionsTypes"
    DimensionsTypes:
      description: |-
        Enumeration of supported dimension/filter types.
        "allocation" is an alias for "attribution_group".
        "allocation_rule" is an alias for "attribution".
        "attribution" and "attribution_group" are deprecated. Use "allocation_rule" and "allocation" instead.
      type: string
      enum:
        - datetime
        - fixed
        - optional
        - label
        - tag
        - project_label
        - system_label
        - attribution
        - attribution_group
        - allocation
        - allocation_rule
        - gke
        - gke_label
    AllocationDimensionsTypes:
      description: Enumeration of supported dimension/filter types for allocation components.
      type: string
      enum:
        - datetime
        - fixed
        - optional
        - label
        - tag
        - project_label
        - system_label
        - allocation_rule
        - gke
        - gke_label
    DocumentRef:
      description: Reference to a Firestore document.
      type: object
      properties:
        ID:
          type: string
          description: ID of the document. The last component of the resource path.
        Parent:
          $ref: "#/components/schemas/CollectionRef"
        Path:
          type: string
          description: >-
            The full resource path of the document. A document "doc-1" in
            collection "coll-1" would be: "projects/P/databases/D/documents/coll-1/doc-1".
    Error:
      type: object
      description: Standard error response structure.
      properties:
        error:
          type: string
          description: Detailed error message.
    ExternalAPIGetValue:
      type: object
      description: Single value entry used by some dimension endpoints.
      properties:
        cloud:
          type: string
        value:
          type: string
    ExternalAlertList:
      type: object
      description: List of alerts.
      properties:
        pageToken:
          type: string
          description: Page token. It is used to request a specific page of the list results.
          example: bDl0QkEwVFZxUEwxaUJRaHhTcXM
        rowCount:
          type: integer
          description: The number of returned records.
          format: int64
          example: 1
        alerts:
          type: array
          description: Array of alerts.
          items:
            $ref: "#/components/schemas/Alert"
    ExternalBudgetAlert:
      type: object
      description: Budget alert status details.
      properties:
        forecastedDate:
          type: integer
          format: int64
        percentage:
          type: number
          format: double
        triggered:
          type: boolean
    ExternalConfig:
      type: object
      description: Report configuration.
      properties:
        metric:
          deprecated: true
          description: "Deprecated: Use 'metrics' instead."
          allOf:
            - $ref: "#/components/schemas/ExternalMetric"
        metrics:
          type: array
          description: The list of metrics to apply to the report. Custom metric can be used only once. Maximum number of metrics is 4.
          items:
            $ref: "#/components/schemas/ExternalMetric"
        metricFilter:
          $ref: "#/components/schemas/ExternalConfigMetricFilter"
        aggregation:
          description: How to aggregate data values in the report.
          type: string
          enum:
            - total
            - percent_total
            - percent_col
            - percent_row
        advancedAnalysis:
          $ref: "#/components/schemas/AdvancedAnalysis"
        timeInterval:
          description: Time interval for grouping data in the report.
          type: string
          enum:
            - hour
            - day
            - dayCumSum
            - week
            - isoweek
            - month
            - quarter
            - year
            - week_day
        dimensions:
          description: See [Dimensions](https://help.doit.com/docs/cloud-analytics/reports/editing-your-cloud-report#dimensions).
          type: array
          items:
            $ref: "#/components/schemas/Dimension"
        timeRange:
          $ref: "#/components/schemas/TimeSettings"
        secondaryTimeRange:
          $ref: "#/components/schemas/TimeSettingsSecondary"
        includePromotionalCredits:
          type: boolean
          description: |-
            Whether to include [promotional credits](https://help.doit.com/docs/cloud-analytics/reports/editing-your-cloud-report#promotional-credits).
            If set to **true**, the report must use time interval `month`, `quarter`, or `year`.
        includeSubtotals:
          type: boolean
          description: |-
            Whether to include subgroup totals in the report. This option has no impact when reading a report via API.
          default: false
        filters:
          type: array
          description: The filters to apply to the report.
          items:
            $ref: "#/components/schemas/ExternalConfigFilter"
        group:
          type: array
          description: |-
            The rows that appear in the tabular format of the report. See [Group by](https://help.doit.com/docs/cloud-analytics/reports/editing-your-cloud-report#group-by).
          items:
            $ref: "#/components/schemas/Group"
        layout:
          $ref: "#/components/schemas/ExternalRenderer"
        displayValues:
          type: string
          description: See [View data as (Comparative report)](https://help.doit.com/docs/cloud-analytics/reports/editing-your-cloud-report#view-as).
          enum:
            - actuals_only
            - absolute_change
            - percentage_change
            - absolute_and_percentage
        currency:
          $ref: "#/components/schemas/Currency"
        sortGroups:
          type: string
          default: asc
          enum:
            - asc
            - desc
            - a_to_z
          description: This option has no impact when reading reports via API.
        sortDimensions:
          type: string
          default: desc
          enum:
            - asc
            - desc
            - a_to_z
          description: This option has no impact when reading reports via API.
        dataSource:
          type: string
          description: Data source of the report.
          enum:
            - billing
            - bqlens
            - billing-datahub
            - kubernetes-utilization
        splits:
          type: array
          description: The splits to use in the report.
          items:
            $ref: "#/components/schemas/ExternalSplit"
        customTimeRange:
          description: Required when the time range is set to "custom".
          type: object
          properties:
            from:
              type: string
              format: date-time
              description: The start timestamp of the time range in RFC3339 format.
              example: "2024-03-10T23:00:00Z"
            to:
              type: string
              format: date-time
              description: The end timestamp of the time range in RFC3339 format.
              example: "2024-03-12T23:00:00Z"
      example:
        metrics:
          - type: basic
            value: cost
          - type: basic
            value: usage
          - type: extended
            value: amortized_cost
        metricFilter:
          metric:
            type: basic
            value: cost
          operator: nb
          values:
            - -1
            - 1
        aggregation: total
        advancedAnalysis:
          forecast: false
          notTrending: false
          trendingDown: false
          trendingUp: false
        timeInterval: month
        dimensions:
          - id: year
            type: datetime
          - id: month
            type: datetime
        timeRange:
          amount: 3
          includeCurrent: false
          mode: last
          unit: month
        includePromotionalCredits: false
        includeSubtotals: false
        filters:
          - id: attribution
            type: attribution
            values:
              - RB8DndcxODriK83IBXXf
              - D7r4znsTj2UC95zGnunW
            inverse: true
          - id: cloud_provider
            type: fixed
            values:
              - amazon-web-services
              - google-cloud
              - microsoft-azure
        group:
          - id: service_description
            limit:
              metric:
                type: basic
                value: cost
              sort: a_to_z
              value: 0
            type: fixed
        layout: table
        displayValues: actuals_only
        currency: USD
        sortGroups: a_to_z
        sortDimensions: a_to_z
        dataSource: billing
    ExternalConfigFilter:
      description: |-
        To include or exclude certain values.
        When using allocation rules as a filter, both the type and the ID must be "allocation_rule", and the values array contains the allocation rule IDs.
        When using allocations as a filter, the type must be "allocation" and the ID is the actual allocation group ID.
      type: object
      required:
        - id
        - type
        - mode
      properties:
        id:
          type: string
          description: The field to filter on
        type:
          $ref: "#/components/schemas/DimensionsTypes"
        mode:
          type: string
          description: Filter mode to apply
          enum:
            - is
            - starts_with
            - ends_with
            - contains
            - regexp
        inverse:
          type: boolean
          description: Set to `true` to exclude the values.
        caseInsensitive:
          type: boolean
          description: If true, string matching is case-insensitive. Effective only for starts_with, ends_with, and contains modes; ignored otherwise.
          default: false
        values:
          type: array
          description: Values to filter on.
          items:
            type: string
        includeNull:
          type: boolean
          description: Include null value.
          default: false
      example:
        id: cloud_provider
        type: fixed
        inverse: false
        values:
          - google-cloud
    ExternalConfigMetricFilter:
      description: Metric filter to limit report rows by metric value.
      type: object
      properties:
        metric:
          $ref: "#/components/schemas/ExternalMetric"
        operator:
          description: Comparison operator for filtering metric values.
          type: string
          enum:
            - gt
            - lt
            - lte
            - gte
            - b
            - nb
            - e
            - ne
        values:
          type: array
          items:
            type: number
            format: double
      example:
        metric:
          type: basic
          value: cost
        operator: gt
        values:
          - 50
    ExternalMetric:
      description: Metric selector used in reports and filters.
      type: object
      properties:
        type:
          description: Type of metric to use.
          type: string
          enum:
            - basic
            - custom
            - extended
        value:
          type: string
          description: >-
            For basic metrics, the value can be one of: ["cost", "usage",
            "savings"]

            If using custom metrics, the value must refer to an existing custom metric ID.
      example:
        type: basic
        value: cost
    ExternalOrigin:
