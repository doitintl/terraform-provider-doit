    Alert:
      required:
        - name
      type: object
      description: Configuration and runtime metadata of an alert.
      properties:
        id:
          type: string
          description: Alert ID.
        name:
          type: string
          description: Alert Name.
          default: ""
        createTime:
          type: integer
          description: The time when the alert was created (in UNIX timestamp).
          format: int64
        updateTime:
          type: integer
          description: Last time the alert was modified (in UNIX timestamp).
          format: int64
        lastAlerted:
          type: integer
          description: Last time the alert was triggered (in UNIX timestamp).
          format: int64
        recipients:
          type: array
          description: List of emails that will be notified when the alert is triggered.
          items:
            type: string
        config:
          $ref: "#/components/schemas/AlertConfig"
      example:
        id: 7jyrczd6CSh3M8TuQ6Qq
        name: fgfgh
        createTime: 1678628817062
        updateTime: 1678628938891
        lastAlerted: null
        recipients:
          - user1@example.com
          - user2@example.com
        config:
          condition: value
          currency: USD
          metric:
            type: basic
            value: cost
          operator: gt
          evaluateForEach: ""
          attributions:
            - PvqyGcdFcTHh7aLUdGdf
          scopes: []
          timeInterval: month
          dataSource: billing
          value: 500
    AlertConfig:
      type: object
      description: Parameters that define when and how an alert is evaluated.
      required:
        - metric
        - timeInterval
        - value
      properties:
        condition:
          $ref: "#/components/schemas/Condition"
        currency:
          $ref: "#/components/schemas/Currency"
        metric:
          $ref: "#/components/schemas/MetricConfig"
        operator:
          $ref: "#/components/schemas/MetricFilterText"
        evaluateForEach:
          type: string
          description: >-
            Add a dimension to break down the evaluation of the condition. For example, evaluate a condition over an attribution for each "Service".
        attributions:
          type: array
          deprecated: true
          description: Use 'scopes' instead. The attributions selected define the scope to monitor.
          items:
            type: string
        scopes:
          type: array
          description: The filters selected define the scope of the alert.
          items:
            $ref: "#/components/schemas/ExternalConfigFilter"
        timeInterval:
          type: string
          description: The time interval to evaluate the condition.
          default: year
          enum:
            - hour
            - day
            - week
            - month
            - quarter
            - year
        dataSource:
          type: string
        value:
          type: number
          format: double
    AlertRequest:
      required:
        - config
        - name
      type: object
      description: Request body for creating a new alert.
      properties:
        config:
          $ref: "#/components/schemas/AlertConfig"
        name:
          type: string
          description: Name of the alert.
        recipients:
          type: array
          description: List of emails to notify when the alert is triggered.
          items:
            type: string
      example:
        config:
          metric:
            type: basic
            value: cost
          timeInterval: year
          operator: gt
          scopes:
            - key: service_description
              type: fixed
              values:
                - Amazon Simple Storage Service
          condition: value
          currency: USD
          value: 1000
        name: test08
