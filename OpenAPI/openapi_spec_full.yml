        "404":
          $ref: "#/components/responses/404"
    delete:
      tags:
        - Alerts
      summary: Delete an alert
      description: Deletes the alert specified by the Id.
      operationId: deleteAlert
      parameters:
        - name: id
          in: path
          description: Alert ID
          required: true
