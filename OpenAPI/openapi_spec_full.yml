          description: Email address of the ticket requester.
        severity:
          type: string
          description: Ticket severity.
          enum:
            - low
            - normal
            - high
            - urgent
        platform:
          type: string
          description: Platform of the ticket.
          enum:
            - doit
            - google_cloud_platform
            - amazon_web_services
            - microsoft_azure
        product:
          type: string
          description: Ticket product.
        status:
          type: string
          description: Ticket status.
        createTime:
          type: integer
          description: The time when this ticket was created, in milliseconds since the epoch.
          format: int64
        updateTime:
          type: integer
          description: The time when this ticket was last updated, in milliseconds since the epoch.
          format: int64
        urlUI:
          type: string
          description: Link to the ticket in DoiT console.
        is_public:
          type: boolean
          description: Whether the ticket is public.
    CommentExtAPI:
      type: object
      description: A comment on a support ticket.
      properties:
        id:
          type: integer
          description: Comment ID.
          format: int64
        body:
          type: string
          description: The text content of the comment.
        author:
          type: string
          description: Email address of the comment author.
        created:
          type: integer
          description: The time when this comment was created, in milliseconds since the epoch.
          format: int64
        attachments:
          type: array
          description: File attachments on the comment.
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
              file_name:
                type: string
              content_url:
                type: string
    CommentsResponseExtAPI:
      type: object
      description: Response containing all comments on a support ticket.
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/CommentExtAPI"
    CreateCommentRequest:
      type: object
      description: Request body for adding a comment to a support ticket.
      required:
        - body
      properties:
        body:
          type: string
          description: The text content of the comment. Must not be empty.
        private:
          type: boolean
          description: If true, creates a private internal note. Only honored for DoiT employees; ignored for customers.
          default: false
    ResourceReference:
      type: object
      description: Reference to another resource, used when listing blockers or usages.
      properties:
        id:
          type: string
          description: Resource identifier
        name:
          type: string
          description: Resource name
        owner:
          type: string
          description: Resource owner (only present if requester doesn't have access)

    BlockingResources:
      type: object
      description: Map of resources that block deletion operations.
      properties:
        alerts:
          type: array
          description: List of alerts using this resource.
          items:
            $ref: "#/components/schemas/ResourceReference"
        attributionGroups:
          type: array
          description: List of attribution groups using this resource (only applicable for attribution deletion).
          items:
            $ref: "#/components/schemas/ResourceReference"
        attributions:
          type: array
          description: List of attributions using this resource (only applicable for attribution deletion).
          items:
            $ref: "#/components/schemas/ResourceReference"
        budgets:
          type: array
          description: List of budgets using this resource.
          items:
            $ref: "#/components/schemas/ResourceReference"
        reports:
          type: array
          description: List of reports using this resource.
          items:
            $ref: "#/components/schemas/ResourceReference"
      example:
        budgets:
          - id: "budget-id"
            name: "Example Budget"
    Role:
      type: object
      description: Definition and permissions assigned to a role.
      properties:
        id:
          type: string
          description: The unique ID of the role.
        name:
          type: string
          description: The name of the role.
        type:
          type: string
          description: The type of the role (preset or custom).
        customer:
          type: string
          description: The customer ID if this is a custom role.
        permissions:
          type: array
          description: List of permission IDs assigned to the role.
          items:
            type: string
    FindCloudDiagramsRequest:
      type: object
      required:
        - resources
      description: Request body for locating cloud diagrams for given resource IDs.
      properties:
        resources:
          type: array
          description: Resource IDs to find diagrams for.
          items:
            type: string
    FindCloudDiagramsResponse:
      type: array
      description: List of diagram URLs matching the criteria.
      items:
        type: object
        required:
          - diagramUrl
          - imageUrl
        properties:
          diagramUrl:
            type: string
            format: uri
            description: URL to the diagram viewer.
          imageUrl:
            type: string
            format: uri
            description: URL to the diagram image.
    Organization:
      type: object
      description: Organization metadata returned by the API.
      properties:
        id:
          type: string
          description: The unique ID of the organization
        name:
          type: string
          description: The name of the organization
    ListUsersResponseBody:
      type: object
      description: Response body for the list users endpoint.
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserListItem"
        rowCount:
          type: integer
          description: The number of returned records.
          format: int64
          example: 5
    InviteResponse:
      type: object
      description: Response returned after creating a user invitation.
      properties:
        message:
          type: string
          description: Success message
        user:
          $ref: "#/components/schemas/InvitedUserBody"
    InvitedUserBody:
      type: object
      properties:
        id:
          type: string
          description: The unique ID of the invited user.
        email:
          type: string
          description: The email address of the invited user.
        roleId:
          type: string
          description: The ID of the role assigned to the user.
        organizationId:
          type: string
          description: The ID of the organization assigned to the user.
        status:
          type: string
          description: The status of the user (invited)
          enum:
            - invited
    CommitmentExternal:
      type: object
      description: A commitment contract.
      properties:
        id:
          type: string
          description: The unique identifier of the commitment.
        name:
          type: string
          description: The name of the commitment.
        startDate:
          type: string
          format: date-time
          example: "2024-03-10T23:00:00Z"
          description: The start date of the commitment.
        endDate:
          type: string
          format: date-time
          example: "2024-03-10T23:00:00Z"
          description: The end date of the commitment.
        currency:
          type: string
          description: The currency of the commitment (e.g., USD).
          example: USD
        cloudProvider:
          type: string
          description: The cloud provider associated with the commitment.
          enum:
            - google-cloud
            - amazon-web-services
            - microsoft-azure
        totalCommitmentValue:
          type: number
          format: double
          description: The total value of the commitment across all periods.
        totalCurrentAttainment:
          type: number
          format: double
          description: The total current spend attainment across all periods.
        periods:
          type: array
          description: The list of commitment periods.
          items:
            $ref: "#/components/schemas/CommitmentPeriod"
        createTime:
          type: integer
          format: int64
          description: The creation time in milliseconds since epoch.
        updateTime:
          type: integer
          format: int64
          description: The last update time in milliseconds since epoch.
    CommitmentExternalList:
      type: object
      description: List of commitments.
      properties:
        pageToken:
          type: string
          description: Page token. It is used to request a specific page of the list results.
          example: bDl0QkEwVFZxUEwxaUJRaHhTcXM
        rowCount:
          type: integer
          description: The number of returned records.
          format: int64
          example: 1
        commitments:
          type: array
          description: Array of commitments.
          items:
            $ref: "#/components/schemas/CommitmentExternalListItem"
    CommitmentExternalListItem:
      type: object
      description: Summary information of a commitment in a list.
      properties:
        id:
          type: string
          description: The unique identifier of the commitment.
        name:
          type: string
          description: The name of the commitment.
        startDate:
          type: string
          format: date-time
          example: "2024-03-10T23:00:00Z"
          description: The start date of the commitment.
        endDate:
          type: string
          format: date-time
          example: "2024-03-10T23:00:00Z"
          description: The end date of the commitment.
        currency:
          type: string
          description: The currency of the commitment.
          example: USD
        cloudProvider:
          type: string
          description: The cloud provider associated with the commitment.
          enum:
            - google-cloud
            - amazon-web-services
            - microsoft-azure
        totalCommitmentValue:
          type: number
          format: double
          description: The total value of the commitment across all periods.
        totalCurrentAttainment:
          type: number
          format: double
          description: The total current spend attainment across all periods.
        periods:
          type: array
          description: The list of commitment periods.
          items:
            $ref: "#/components/schemas/CommitmentPeriod"
        createTime:
          type: integer
          format: int64
          description: The creation time in milliseconds since epoch.
        updateTime:
          type: integer
          format: int64
          description: The last update time in milliseconds since epoch.
    CommitmentPeriod:
      type: object
      description: A single period within a commitment.
      properties:
        startDate:
          type: string
          format: date-time
          example: "2024-03-10T23:00:00Z"
          description: The start date of the period.
        endDate:
          type: string
          format: date-time
          example: "2024-03-10T23:00:00Z"
          description: The end date of the period.
        commitmentValue:
          type: number
          format: double
          description: The commitment value for this period.
        marketplaceLimitPercentage:
          type: number
          format: double
          description: The marketplace limit as a percentage (0-100).
    AvaAskRequest:
      type: object
      properties:
        question:
          type: string
          description: The question to ask Ava.
        conversationId:
          type: string
          description: Optional ID of an existing conversation to continue.
      required:
        - question
    AvaAskSyncRequest:
      type: object
      properties:
        question:
          type: string
          description: The question to ask Ava.
        conversationId:
          type: string
          description: Optional ID of an existing conversation to continue.
        ephemeral:
          type: boolean
          default: false
          description: When true, the conversation is not persisted. Recommended for programmatic consumers (Terraform, MCP, CI pipelines).
      required:
        - question
    AvaAskSyncResponse:
      type: object
      properties:
        answer:
          type: string
          description: The Ava response text.
        conversationId:
          type: string
          description: The conversation ID. Present only for non-ephemeral requests. Can be used with the delete conversation endpoint.
        answerId:
          type: string
          description: The answer ID within the conversation. Present only for non-ephemeral requests. Required for the feedback endpoint.
      required:
        - answer
    AvaFeedbackRequest:
      type: object
      properties:
        conversationId:
          type: string
          description: The conversation ID the feedback relates to.
        answerId:
          type: string
          description: The specific answer ID within the conversation.
        feedback:
          type: object
          properties:
            positive:
              type: boolean
              description: Whether the feedback is positive or negative.
            text:
              type: string
              description: Optional text providing additional feedback details.
          required:
            - positive
      required:
        - conversationId
        - answerId
        - feedback
  responses:
    "400":
      description: >-
        Bad Request - The server cannot process the request, often due to a malformed request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "401":
      description: >-
        Unauthorized - Invalid API key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "403":
      description: >-
        Forbidden - The client is not authorized to perform the request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "404":
      description: >-
        Not Found - The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "429":
      description: >-
        Too Many Requests.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "500":
      description: >-
        Internal Server Error - Something went wrong with the DoiT API server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TicketResponseExtAPI:
      description: Creates a new service or support request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TicketResponseExtAPI"
    TicketsList:
      description: Lists all historical requests the user has access to.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TicketsList"
    anomaliesResponse:
      description: Lists all cloud cost anomalies.
      content:
        application/json:
          schema:
            type: object
            properties:
              Report:
                $ref: "#/components/schemas/AnomaliesResponse"
    anomalyResponse:
      description: Returns cloud cost anomaly details based on anomalyId.
      content:
        application/json:
          schema:
            required:
              - attribution
              - billingAccount
              - costOfAnomaly
              - platform
              - scope
              - serviceName
              - severityLevel
              - startTime
              - timeFrame
              - top3SKUs
            type: object
            properties:
              attribution:
                type: string
                description: Attribution ID
              billingAccount:
                type: string
                description: Billing account ID
              costOfAnomaly:
                type: number
                description: Cost of the anomaly over and above the expected normal cost
                format: double
              platform:
                type: string
                description: Cloud Provider name
              scope:
                type: string
                description: "Scope: Project or Account"
              serviceName:
                type: string
                description: Service name
              severityLevel:
                type: string
                description: "Severity level: Information, Warning or Critical"
              startTime:
                type: integer
                description: Usage start time of the anomaly
                format: int64
              timeFrame:
                type: string
                description: "Timeframe: Daily or Hourly"
              top3SKUs:
                $ref: "#/components/schemas/AnomalySKUArray"
              resourceData:
                $ref: "#/components/schemas/AnomalyResourceArray"
  parameters:
    maxResults:
      name: maxResults
      in: query
      description: >-
        The maximum number of results to return in a single page. Use the page tokens to iterate through the entire collection.
      schema:
        type: string
        default: "50"
    pageToken:
      name: pageToken
      in: query
      description: Page token, returned by a previous call, to request the next page of results
      schema:
        type: string
    reportId:
      name: id
      in: path
      description: Report ID. See [Resource IDs](https://developer.doit.com/docs/resource-ids).
      required: true
      schema:
        type: string
    sortOrder:
      name: sortOrder
      in: query
      description: Sort order can be ascending or descending.
      schema:
        type: string
        enum:
          - asc
          - desc
    resourceType:
      name: resourceType
      in: path
      description: Resource type.
      required: true
      schema:
        type: string
        enum:
          - alerts
          - budgets
          - reports
          - allocations
    resourceId:
      name: resourceId
      in: path
      description: Resource ID. See [Resource IDs](https://developer.doit.com/docs/resource-ids).
      required: true
      schema:
        type: string
  securitySchemes:
    api_key:
      type: apiKey
      name: Authorization
      description: Use the "Bearer <API_KEY>" format or sign in for autofill
      in: header
    customerContext:
      type: apiKey
      name: customerContext
      in: query
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: ${CONSOLE_BASE_URL}/sign-in/oauth
          tokenUrl: ${CONSOLE_BASE_URL}/api/auth/token
          scopes:
            dci: Access All Data
x-samples-languages:
  - curl
  - go
  - node
  - python
x-cli-config:
  security: oauth2
  params:
    client_id: cli
