    post:
      tags:
        - DataHub
      summary: Create dataset
      description: Creates a new DataHub dataset. A dataset is a logical grouping of events that share the same provider name. Creating a dataset allows you to define metadata such as name and description before ingesting events.
      operationId: createDatahubDataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: "The name of the dataset. Allowed characters: alphanumeric (0-9,a-z,A-Z), underscore (_), dash (-), and spaces between words."
                  example: "My Custom Dataset"
                  pattern: "^[a-zA-Z0-9_-]+( [a-zA-Z0-9_-]+)*$"
                description:
                  type: string
                  description: An optional description for the dataset.
                  example: "Dataset for tracking custom business metrics"
      responses:
        "201":
          description: Created - Dataset created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    description: The name of the dataset.
                    example: "My Custom Dataset"
                  description:
                    type: string
                    description: The description of the dataset.
                    example: "Dataset for tracking custom business metrics"
                  records:
                    type: integer
                    format: int64
                    description: The number of records in the dataset.
                    example: null
                    nullable: true
                  updatedBy:
                    type: string
                    description: The email of the user who last updated the dataset.
                    example: "user@example.com"
                  lastUpdated:
                    type: string
                    description: The timestamp of the last update.
                    example: "2024-03-10T23:00:00Z"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "500":
          $ref: "#/components/responses/500"
    delete:
