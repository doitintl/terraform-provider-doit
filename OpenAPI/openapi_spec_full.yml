components:
  schemas:
    DisplayStatus:
      type: string
      enum:
        - "actionable"
        - "acknowledged"
        - "optimized"
        - "dismissed"
        - "in progress"
        - "upgrade needed"
        - "permissions needed"
      description: The display status of the insight.
    ResultsBody:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/InsightResponse"
        pagination:
          $ref: "#/components/schemas/Pagination"
    CreateResultsBody:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/InsightRequest"
    InsightRequest:
      type: object
      required: [key, title, shortDescription, provider, categories, resourceResults]
      properties:
        key:
          type: string
        title:
          type: string
        shortDescription:
          type: string
        detailedDescriptionMdx:
          type: string
        provider:
          $ref: "#/components/schemas/Provider"
        categories:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/CreateCategory"
        tags:
          description: primary purpose, initially, is to provide security certification information, eg. ISO etc.
          type: array
          items:
            type: string
        reportUrl:
          type: string
        cloudFlowTemplateId:
          type: string
        easyWinDescription:
          type: string
        resourceResults:
          $ref: "#/components/schemas/ResourceResults"
    InsightResponse:
      type: object
      properties:
        source:
          $ref: "#/components/schemas/Source"
        key:
          type: string
        title:
          type: string
        shortDescription:
          type: string
        detailedDescriptionMdx:
          type: string
        displayStatus:
          $ref: "#/components/schemas/DisplayStatus"
        provider:
          $ref: "#/components/schemas/Provider"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        summary:
          $ref: "#/components/schemas/InsightSummary"
        lastStatusChange:
          $ref: "#/components/schemas/LastInsightStatusChange"
        lastUpdated:
          type: string
          format: date-time
        tags:
          description: primary purpose, initially, is to provide security certification information, eg. ISO etc.
          type: array
          items:
            type: string
        reportUrl:
          type: string
        cloudFlowTemplateId:
          type: string
        easyWinDescription:
          type: string
    Category:
      type: string
      enum: ["FinOps", "Operational excellence", "Performance efficiency", "Reliability", "Security", "Sustainability"]
    CreateCategory:
      type: string
      enum: ["FinOps", "Security"]
    InsightSummary:
      type: object
      properties:
        operationalRisks:
          type: number
        performanceRisks:
          type: number
        potentialDailySavings:
          type: number
        reliabilityRisks:
          type: number
        securityRisks:
          type: number
        sustainabilityRisks:
          type: number
    ResourceResults:
      type: array
      items:
        oneOf:
          - $ref: "#/components/schemas/SecurityRiskResourceResult"
          - $ref: "#/components/schemas/DailySavingsResourceResult"
          - $ref: "#/components/schemas/DailySavingsRecommendationResourceResult"
          - $ref: "#/components/schemas/DailySavingsClusterAgentResourceResult"
    ResourceResult:
      type: object
      required:
        - resourceId
        - resultType
        - account
        - provider
      properties:
        resourceId:
          type: string
        resourceType:
          description: What the resource actually is, eg. for an EC2 resource ID, this field would be `instance`
          type: string
          example: instance, disk, cache
        provider:
          $ref: "#/components/schemas/Provider"
        account:
          type: string
        location:
          type: string
          description: represents the region/zone of the resource in AWS, or equivalent for other providers
          example: eu-west-2
        resolved:
          type: boolean
        severity:
          type: string
          enum: ["critical", "high", "medium", "low"]
        externalId:
          type: string
          description: the external ID of the resource in the provider's system for the resource
        externalUrl:
          type: string
          description: the URL to the resource-level issue in the provider's system
