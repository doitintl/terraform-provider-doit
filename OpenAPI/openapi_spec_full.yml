        type:
          type: string
        workspace:
          type: string
    TimeSettings:
      type: object
      description: >-
        Specify a predefined or custom time range for the report.

        For example, to specify a custom time range of "last 2 days", set the mode to `last`, the amount to `2`, and the unit to `day`. If `includeCurrent` is `true`, the range will be yesterday and today; otherwise, the range will be yesterday and the day before yesterday.

        If "custom" type is specified, you need to provide a custom time range in the `customTimeRange` field.
      properties:
        amount:
          description: Number of time units to include in the time range.
          maximum: 5000
          minimum: 0
          type: integer
          format: int64
        includeCurrent:
          description: Whether to include the current time period.
          type: boolean
        mode:
          description: Time range mode (last N periods, current period, or custom).
          type: string
          enum:
            - last
            - current
            - custom
        unit:
          description: Time unit for the time range.
          type: string
          enum:
            - day
            - week
            - month
            - quarter
            - year
      example:
        amount: 3
        includeCurrent: false
        mode: last
        unit: month
    TimeSettingsSecondary:
      type: object
      description: Secondary time range for comparative reports.
      properties:
        amount:
          description: Number of periods to shift back.
          type: integer
          format: int64
        includeCurrent:
          description: >-
            Whether to align to complete previous periods (full year/quarter/month) vs shifting dates by amount.
                When `true`, selects complete periods (e.g., full previous year Jan 1-Dec 31, not up to today).
                When `false`, shifts dates by amount, which may result in partial periods extending to today.
          type: boolean
        unit:
          description: Time interval unit for shifting.
          type: string
          enum:
            - day
            - month
            - quarter
            - year
        customTimeRange:
          description: Custom date range for the secondary time range.
          type: object
          properties:
            from:
              type: string
              format: date-time
              description: Start date.
            to:
              type: string
              format: date-time
              description: End date.
      example:
        amount: 1
        includeCurrent: false
        unit: year
