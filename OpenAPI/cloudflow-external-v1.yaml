# ================================================================
# Components
# ================================================================
components:
  # --------------------------------------------------------------
  # Security schemes
  # --------------------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  # --------------------------------------------------------------
  # Parameters
  # --------------------------------------------------------------
  parameters:
    MaxResults:
      name: maxResults
      in: query
      description: Maximum number of results to return in a single page. Default 50, max 500.
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50

    PageToken:
      name: pageToken
      in: query
      description: Opaque page token returned by a previous list call. Expired tokens return 400 `pagination_token_expired`.
      schema:
        type: string

    DryRun:
      name: dryRun
      in: query
      description: |
        Validate and preview the operation without persisting changes.
        - Create endpoints: returns `200` with generated fields (`id`, `etag`, `createTime`, `updateTime`) set to `null`.
        - Mutation endpoints: returns `200` with the projected updated state.
        - Response includes `X-Dry-Run: true` header.
      schema:
        type: boolean
        default: false

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Client-generated idempotency key for safe retries of side-effecting requests.
        - Same key + matching fingerprint → original response is replayed with `Idempotency-Replayed: true`.
        - Same key + different fingerprint → `422 idempotency_key_reused`.
        - Missing → `400 idempotency_key_required`.
        - TTL: 24 hours.
        - Dry-run: fingerprint is validated but no cache entry is stored.
      schema:
        type: string
        maxLength: 255

    IfMatchRequired:
      name: If-Match
      in: header
      required: true
      description: |
        Strong ETag of the current resource version for optimistic concurrency control.
        Obtain from the `ETag` response header of a preceding GET or mutation.
        - Absent → `428 precondition_required`.
        - Mismatch → `412 precondition_failed`.
      schema:
        type: string
        examples:
          - '"a1b2c3d4"'

    TenantId:
      name: X-Tenant-Id
      in: header
      required: false
      description: |
        Tenant (customer) identifier. Required when the authenticated principal can access
        more than one tenant. Absent for single-tenant principals — tenant is resolved
        implicitly from the token. Absent for multi-tenant principals → `400 tenant_id_required`.
      schema:
        type: string

    FlowId:
      name: flowId
      in: path
      required: true
      description: Unique identifier of the flow.
      schema:
        type: string

    NodeId:
      name: nodeId
      in: path
      required: true
      description: Unique identifier of the node.
      schema:
        type: string

    VariableId:
      name: variableId
      in: path
      required: true
      description: Unique identifier of the variable.
      schema:
        type: string

    ConnectionId:
      name: connectionId
      in: path
      required: true
      description: Unique identifier of the connection.
      schema:
        type: string

    TemplateId:
      name: templateId
      in: path
      required: true
      description: Unique identifier of the template.
      schema:
        type: string

  # --------------------------------------------------------------
  # Response headers
  # --------------------------------------------------------------
  headers:
    RequestId:
      description: |
        DoiT request identifier of the form `req_<ULID>`. Present on every response.
        Use for support tickets and log correlation. Equals the `instance` path segment
        in the problem body on error responses.
      schema:
        $ref: "#/components/schemas/RequestId"

    ContentLanguage:
      description: Language of human-readable response text. Always `en`.
      schema:
        type: string
        enum: [en]

    ETag:
      description: |
        Strong entity tag for the current resource version. Returned on all mutable resource
        responses including `204 No Content` (DELETE). Pass as `If-Match` on subsequent
        mutations to guard against concurrent edits.
      schema:
        type: string
        examples:
          - '"a1b2c3d4"'

    Location:
      description: Canonical URL of the created resource. Present on `201 Created` responses.
      schema:
        type: string
        format: uri-reference

    XDryRun:
      description: Present and set to `true` on dry-run responses.
      schema:
        type: boolean
        enum: [true]

  # --------------------------------------------------------------
  # Common responses
  # --------------------------------------------------------------
  responses:
    BadRequest:
      description: |
        `400 Bad Request` — caller error. Common `code` values:
        - `validation_failed` — malformed or semantically invalid request body / parameters.
        - `idempotency_key_required` — `Idempotency-Key` header is missing on a required endpoint.
        - `tenant_id_required` — multi-tenant principal did not supply `X-Tenant-Id`.
        - `pagination_token_expired` — page token has expired (TTL exceeded).
        - `pagination_token_invalid` — page token is malformed or for a different query.
      headers:
        Request-Id:
          $ref: "#/components/headers/RequestId"
        Content-Language:
          $ref: "#/components/headers/ContentLanguage"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    Unauthorized:
      description: "`401 Unauthorized` — missing or invalid credentials."
      headers:
        Request-Id:
          $ref: "#/components/headers/RequestId"
        Content-Language:
          $ref: "#/components/headers/ContentLanguage"
        WWW-Authenticate:
          schema:
            type: string
            examples:
              - 'Bearer realm="api.doit.com"'
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    Forbidden:
      description: "`403 Forbidden` — authenticated but not authorised for this resource or action."
      headers:
        Request-Id:
          $ref: "#/components/headers/RequestId"
        Content-Language:
          $ref: "#/components/headers/ContentLanguage"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    NotFound:
      description: "`404 Not Found` — resource does not exist or is not visible to the caller."
      headers:
        Request-Id:
          $ref: "#/components/headers/RequestId"
        Content-Language:
          $ref: "#/components/headers/ContentLanguage"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    Conflict:
      description: |
        `409 Conflict`. Discriminated by `code`:
        - `conflict` — generic edit collision.
        - `duplicate_name` — a resource with the same name already exists in scope.
        - `idempotency_request_in_progress` — same key + fingerprint is currently in flight; wait and retry.
        - `delete_blocked_by_dependencies` — resource cannot be deleted; dependents listed in `details`.
      headers:
        Request-Id:
          $ref: "#/components/headers/RequestId"
        Content-Language:
          $ref: "#/components/headers/ContentLanguage"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    UnprocessableEntity:
      description: |
        `422 Unprocessable Entity`. Discriminated by `code`:
        - `validation_failed` — request body failed semantic validation (field errors in `details`).
        - `idempotency_key_reused` — same key was used with a different request fingerprint.
        - `connection_not_found` — a connection-type variable references a connection that does not exist
          or does not belong to this tenant.
      headers:
        Request-Id:
          $ref: "#/components/headers/RequestId"
        Content-Language:
          $ref: "#/components/headers/ContentLanguage"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    PreconditionFailed:
      description: |
        `412 Precondition Failed` — `If-Match` was supplied but does not match the current
        resource ETag. Fetch the resource to get the latest ETag and retry.
        Code: `precondition_failed`.
      headers:
        Request-Id:
          $ref: "#/components/headers/RequestId"
        Content-Language:
          $ref: "#/components/headers/ContentLanguage"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    PreconditionRequired:
      description: |
        `428 Precondition Required` — `If-Match` header is required on this endpoint but
        was not supplied.
        Code: `precondition_required`.
      headers:
        Request-Id:
          $ref: "#/components/headers/RequestId"
        Content-Language:
          $ref: "#/components/headers/ContentLanguage"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

    TooManyRequests:
      description: "`429 Too Many Requests` — rate limit exceeded. Retry after the `Retry-After` delay."
      headers:
        Request-Id:
          $ref: "#/components/headers/RequestId"
        Content-Language:
          $ref: "#/components/headers/ContentLanguage"
        Retry-After:
          description: Delay in seconds before the next request may be attempted.
          schema:
            type: integer
            minimum: 1
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  # --------------------------------------------------------------
  # Schemas
  # --------------------------------------------------------------
  schemas:
    # ----------------------------------------------------------------
    # Standard — RFC 9457 / DoiT extensions
    # ----------------------------------------------------------------
    RequestId:
      type: string
      pattern: "^req_[0-9A-HJKMNP-TV-Z]{26}$"
      description: DoiT request identifier. Always of the form `req_<ULID>`.
      examples:
        - "req_01HX9P2KQVJ8Z3M4T5N6V7W8Y9"

    ProblemDetails:
      type: object
      additionalProperties: true
      description: |
        DoiT Problem Details payload, compatible with RFC 9457 with DoiT extensions.
      required: [type, title, status, detail, instance, code, retryable]
      properties:
        type:
          type: string
          format: uri
          description: |
            Stable URI identifying the problem type.
            Convention: `https://developer.doit.com/errors/<code>`.
        title:
          type: string
          description: |
            Short, stable, human-readable summary of the problem type. Suitable for
            documentation. Do not branch logic on `title` — use `code` instead.
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: HTTP status code, repeated in the body for log-only consumers.
        detail:
          type: string
          description: |
            Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: |
            URI of the form `https://api.doit.com/requests/{requestId}`. The trailing
            segment equals the `Request-Id` response header value.
        code:
          type: string
          description: |
            Stable, machine-parseable error identifier. Core codes are `lower_snake_case`.
            Service-specific codes use `cloudflow.<code>` notation.
          examples:
            - validation_failed
            - precondition_failed
            - precondition_required
            - conflict
            - duplicate_name
            - delete_blocked_by_dependencies
            - idempotency_key_required
            - idempotency_key_reused
            - idempotency_request_in_progress
            - tenant_id_required
            - pagination_token_expired
            - pagination_token_invalid
            - connection_not_found
        retryable:
          type: boolean
          description: Whether retrying the identical request (without changes) might succeed.
        details:
          type: array
          description: |
            Structured per-field diagnostic objects. Each object carries a `issue`
            identifier; objects describing a specific field also carry `field`.
          items:
            type: object
            required: [issue]
            additionalProperties: true
            properties:
              issue:
                type: string
                pattern: "^[a-z][a-z0-9_]*$"
                description: Stable snake_case identifier for the specific diagnostic.
              field:
                type: string
                description: JSON pointer or dotted path to the offending request field.
        docsUrl:
          type: ["string", "null"]
          format: uri
          description: Optional URL to human-readable remediation documentation.

    # ----------------------------------------------------------------
    # Pagination envelopes
    # ----------------------------------------------------------------
    CursorPageEnvelope:
      type: object
      properties:
        pageToken:
          type: ["string", "null"]
          description: |
            Opaque cursor for the next page. `null` or absent when there are no more pages.
            Pass as `?pageToken=<value>` on the next request. Expires after 5 minutes.
        rowCount:
          type: ["integer", "null"]
          description: |
            Best-effort total count of matching resources. May be `null` for very large
            or filtered result sets.

    FlowListResponse:
      allOf:
        - $ref: "#/components/schemas/CursorPageEnvelope"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Flow"

    VariableListResponse:
      allOf:
        - $ref: "#/components/schemas/CursorPageEnvelope"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Variable"

    ConnectionListResponse:
      allOf:
        - $ref: "#/components/schemas/CursorPageEnvelope"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Connection"

    TemplateListResponse:
      allOf:
        - $ref: "#/components/schemas/CursorPageEnvelope"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Template"

    # ----------------------------------------------------------------
    # Enums
    # ----------------------------------------------------------------
    FlowStatus:
      type: string
      description: |
        Lifecycle state of a flow.
        - `new` — initial state assigned on creation.
        - `draft` — flow has been unpublished, imported, or copied; not yet published.
        - `published` — published and available for scheduled/event-driven execution.
      enum: [new, draft, published]

    ConnectionStatus:
      type: string
      description: |
        Operational status of a connection.
        - `active` — the connection is valid and in use.
        - `disabled` — disabled via `PATCH /connections/{connectionId}`.
        - `pending_permissions` — awaiting a permission grant in the cloud provider.
        - `permissions_failed` — permission setup failed.
        - `inactive` — deactivated.
        - `cloud_deleted` — the underlying cloud resource was deleted externally.
        - `draft` — connection is not yet fully configured.
      enum: [draft, pending_permissions, permissions_failed, active, inactive, cloud_deleted, disabled]

    VariableType:
      type: string
      description: |
        Data type of a variable.
        - `string` — UTF-8 text.
        - `integer` — 64-bit signed integer.
        - `float` — 64-bit floating-point number.
        - `boolean` — true / false.
        - `list` — ordered collection; element type specified by `elementType`.
        - `connection` — reference to a connection resource; provider type specified by `connectionType`.
      enum: [string, integer, float, boolean, list, connection]

    ConnectionProvider:
      type: string
      description: Cloud provider that a connection is bound to.
      enum: [AWS, GCP]

    NodeType:
      type: string
      description: |
        Discriminator that identifies a node's role and determines the shape of its
        `parameters` field.
      enum:
        - triggerNode
        - actionNode
        - conditionNode
        - filterNode
        - httpNode
        - manualTrigger
        - webhookTrigger
        - systemEventTrigger
        - transformation
        - datetimeTransform
        - notificationNode
        - avaNode
        - policy
        - sqlNode
        - codeNode
        - cliNode
        - datastoreNode
        - subFlowNode
        - sleepNode
        - flowOutput
        - scheduleTrigger

    # ----------------------------------------------------------------
    # Flow schemas
    # ----------------------------------------------------------------
    Flow:
      type: object
      required: [id, name, description, status, published, createTime, etag]
      description: A CloudFlow workflow resource.
      properties:
        id:
          type: ["string", "null"]
          description: |
            Server-assigned unique identifier. `null` on dry-run create responses
            (no resource was persisted).
        name:
          type: string
          description: Display name of the flow.
        description:
          type: string
          description: Human-readable description.
        instructions:
          type: ["string", "null"]
          description: Operator instructions or notes attached to the flow.
        status:
          oneOf:
            - $ref: "#/components/schemas/FlowStatus"
            - type: "null"
          description: Lifecycle state. `null` on dry-run create responses.
        published:
          type: boolean
          description: |
            Whether the flow is currently published. Readable on every response; use
            `POST /actions/publish` and `POST /actions/unpublish` to change this value.
        firstNodeId:
          type: ["string", "null"]
          description: ID of the trigger (first) node. `null` if no trigger node has been set.
        triggerType:
          type: ["string", "null"]
          description: |
            Node type of the trigger node. `null` if no trigger node has been set.
            One of the `NodeType` trigger variants: `triggerNode`, `manualTrigger`,
            `webhookTrigger`, `systemEventTrigger`, `scheduleTrigger`.
        createTime:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 timestamp (UTC) when the flow was created. `null` on dry-run create.
        updateTime:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 timestamp (UTC) of the last modification. `null` if never modified or on dry-run.
        lastExecutedTime:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 timestamp (UTC) of the most recent execution. `null` if never executed.
        lastExecutionStatus:
          type: ["string", "null"]
          description: Status string of the most recent execution. `null` if never executed.
        etag:
          type: ["string", "null"]
          description: |
            Strong ETag for this resource version. Pass as `If-Match` on subsequent mutations.
            `null` on dry-run create responses.
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/Node"
          description: |
            Embedded nodes. Populated by the `update-batch` response and by operations that
            return the full flow with nodes inline. Not present on standard list responses.
        nextRun:
          type: ["string", "null"]
          format: date-time
          description: |
            ISO 8601 (UTC) timestamp of the next scheduled execution. `null` if the flow
            has no scheduled trigger, is unpublished, or scheduling is paused.

    CreateFlowRequest:
      type: object
      required: [name]
      description: Request body for `CreateFlow`.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Display name for the new flow.
        description:
          type: string
          maxLength: 2000
          description: Human-readable description.
        instructions:
          type: ["string", "null"]
          description: |
            Operator instructions or notes attached to the flow. Pass `null` or
            omit to leave empty.
    UpdateFlowRequest:
      type: object
      description: |
        Request body for `UpdateFlow` (full replacement). All writable fields are replaced
        with the supplied values. Optional fields that are omitted are reset to their defaults
        (e.g. `instructions` is cleared if absent). Read-only fields (`id`, `status`,
        `published`, `createTime`, `etag`) are silently ignored.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: New display name.
        description:
          type: string
          maxLength: 2000
          description: New description.
        instructions:
          type: string
          description: New operator instructions. Omit to clear.

    # ----------------------------------------------------------------
    # Node schemas
    # ----------------------------------------------------------------
    Node:
      type: object
      required: [id, name, type, appKey, disabled, createTime, etag]
      description: A single node within a CloudFlow.
      properties:
        id:
          type: ["string", "null"]
          description: Server-assigned unique identifier. `null` on dry-run create responses.
        name:
          type: string
          description: Display name.
        description:
          type: string
          description: Human-readable description.
        type:
          $ref: "#/components/schemas/NodeType"
        appKey:
          type: string
          description: Identifier of the integration or application this node belongs to.
        actionId:
          type: string
          description: Identifier of the specific operation this node performs (e.g. AWS service action).
        disabled:
          type: boolean
          description: When `true` this node is skipped during flow execution.
        parameters:
          type: object
          additionalProperties: true
          description: |
            Node-specific configuration. The concrete shape depends on `type`. Refer to
            the CloudFlow node type documentation for the required fields per node type.
        approval:
          description: Optional human approval gate. `null` if no approval is required.
          oneOf:
            - $ref: "#/components/schemas/Approval"
            - type: "null"
        transitions:
          type: array
          items:
            $ref: "#/components/schemas/Transition"
          description: Directed edges to child nodes.
        createTime:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 (UTC) creation timestamp. `null` on dry-run create.
        updateTime:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 (UTC) last-modified timestamp. `null` if never modified.
        etag:
          type: ["string", "null"]
          description: Strong ETag for this node version. `null` on dry-run create.

    Transition:
      type: object
      required: [targetNodeId]
      description: Directed edge from a parent node to a child node.
      properties:
        targetNodeId:
          type: string
          description: ID of the target (child) node.
        label:
          type: string
          enum: ["True", "False"]
          description: >
            Identifies the execution path for branch node transitions.
            Branch nodes have at most two outgoing transitions: one labeled
            "True" and one labeled "False". Required on branch node transitions;
            must be omitted for all other node types.

    Approval:
      type: object
      required: [required, rejectApprovalAfterTime]
      description: Human approval gate configuration for a node.
      properties:
        required:
          type: boolean
          description: Whether approval is required before the node can proceed.
        notificationProvider:
          type: string
          enum: [email, slack]
          description: |
            Delivery channel for the approval notification.
            - `email` — sends to the addresses in `recipients`.
            - `slack` — sends to the channels in `recipients`.
        recipients:
          type: array
          description: |
            Notification recipients. Each entry is a plain string (email address or
            Slack channel identifier) or a referenced node-output value (an upstream
            node's output field resolved at runtime by the flow engine).
          items:
            type: string
        subject:
          type: string
          description: |
            Subject line for email notifications. Plain string or a referenced
            node-output value. Ignored when `notificationProvider` is `slack`.
        message:
          type: string
          description: |
            Approval request message body. May contain inline text, upstream node
            output references, or a mix. Resolved at runtime by the flow engine.
        rejectApprovalAfterTime:
          type: boolean
          description: Whether the approval auto-rejects if not acted on within the time window.
        rejectTimeValue:
          type: integer
          minimum: 1
          description: |
            Number of time units before auto-rejection.
            Required when `rejectApprovalAfterTime` is `true`.
        rejectTimeUnit:
          type: string
          enum: [Hours, Days, Weeks, Months]
          description: |
            Time unit for the auto-rejection window.
            Required when `rejectApprovalAfterTime` is `true`.

    CreateNodeRequest:
      type: object
      required: [node]
      description: Request body for `CreateNode`.
      properties:
        node:
          $ref: "#/components/schemas/NodeInput"
        transition:
          description: |
            Optional wiring to an existing parent node. When supplied, the new node is
            connected as a child of `parentNodeId` via the given branch value.
          oneOf:
            - $ref: "#/components/schemas/ParentTransition"
            - type: "null"

    NodeInput:
      type: object
      required: [name, type, appKey, disabled]
      description: Node payload for create and update operations.
      properties:
        id:
          type: string
          description: |
            Client-provided node ID. Server assigns a ULID-based ID if omitted. Providing a
            stable ID enables idempotent batch operations.
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        type:
          $ref: "#/components/schemas/NodeType"
        appKey:
          type: string
          description: Identifier of the integration or application.
        disabled:
          type: boolean
          default: false
        parameters:
          type: object
          additionalProperties: true
          description: |
            Node-specific configuration. See CloudFlow node type documentation for
            the required fields per `type`.
        approval:
          oneOf:
            - $ref: "#/components/schemas/Approval"
            - type: "null"
        transitions:
          type: array
          items:
            $ref: "#/components/schemas/Transition"
          description: Outgoing edges to child nodes.

    ParentTransition:
      type: object
      required: [parentNodeId]
      description: Wires the new node as a child of an existing parent node.
      properties:
        parentNodeId:
          type: string
          description: ID of the existing parent node.
        label:
          type: string
          enum: ["True", "False"]
          description: >
            Selects which branch of the parent node this node connects to.
            Required when the parent is a branch node; must be "True" or "False".
            Omit for all other parent node types.

    UpdateNodesBatchRequest:
      type: object
      description: |
        Request body for `UpdateNodesBatch`. All changes are applied atomically.
      properties:
        name:
          type: ["string", "null"]
          description: Optional new display name for the flow.
        addedNodes:
          type: array
          description: New nodes to add to the flow.
          items:
            $ref: "#/components/schemas/CreateNodeRequest"
        updatedNodes:
          type: array
          description: |
            Existing nodes to update. Each entry must have `node.id` set to the ID
            of the node being replaced.
          items:
            $ref: "#/components/schemas/CreateNodeRequest"

    # ----------------------------------------------------------------
    # Variable schemas
    # ----------------------------------------------------------------
    Variable:
      type: object
      required: [id, name, type, required, createTime, updateTime, etag]
      description: A CloudFlow variable resource (flow-scoped or global).
      properties:
        id:
          type: ["string", "null"]
          description: Server-assigned unique identifier. `null` on dry-run create responses.
        name:
          type: string
          description: |
            Variable name. Alphanumeric characters, underscores, and dashes only (1–100 chars).
            Must be unique within scope (flow or global).
        description:
          type: string
          description: Human-readable description.
        type:
          $ref: "#/components/schemas/VariableType"
        elementType:
          type: ["string", "null"]
          description: |
            Element type for `list` variables (e.g. `string`, `integer`). Required when
            `type` is `list`; `null` for all other types.
        connectionType:
          type: ["string", "null"]
          description: |
            Connection provider type for `connection` variables (e.g. `AWS`, `GCP`). Required
            when `type` is `connection`; `null` for all other types.
        required:
          type: boolean
          description: Whether a value must be provided before the flow can be published.
        value:
          type: ["string", "null"]
          description: |
            Current value, always string-encoded on the wire. `null` if no value has been set.
            Logical encoding by variable `type`:
            - `string` → the string value
            - `integer` → decimal string, e.g. `"42"`
            - `float` → decimal string, e.g. `"3.14"`
            - `boolean` → `"true"` or `"false"`
            - `list` → JSON-encoded array string, e.g. `"[\"a\",\"b\"]"`
            - `connection` → connection ID string
        createTime:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 (UTC) creation timestamp. `null` on dry-run create.
        updateTime:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 (UTC) last-modified timestamp.
        etag:
          type: ["string", "null"]
          description: Strong ETag. `null` on dry-run create.

    VariableInput:
      type: object
      required: [name, type, required]
      description: |
        Request body for `CreateFlowVariable`, `CreateGlobalVariable`,
        `UpdateFlowVariable`, and `UpdateGlobalVariable`.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[a-zA-Z0-9_\\-]+$"
          description: |
            Variable name. Alphanumeric, underscore, and dash only. Must be unique
            within scope (flow-local or global).
        description:
          type: string
          maxLength: 2000
        type:
          $ref: "#/components/schemas/VariableType"
        elementType:
          type: string
          description: Element type for `list` variables. Required when `type` is `list`.
          enum: [string, integer, float, boolean, connection]
        connectionType:
          $ref: "#/components/schemas/ConnectionProvider"
          description: |
            Connection provider type for `connection` variables.
            Required when `type` is `connection`.
        required:
          type: boolean
          description: Whether the flow requires a value before publishing.
        value:
          type: string
          description: |
            Initial or updated value, always string-encoded on the wire. Encoding by `type`:
            - `string` → the string value
            - `integer` → decimal string, e.g. `"42"`
            - `float` → decimal string, e.g. `"3.14"`
            - `boolean` → `"true"` or `"false"`
            - `list` → JSON-encoded array string, e.g. `"[\"a\",\"b\"]"`
            - `connection` → connection ID string; the referenced connection must exist
              within the tenant and be in an `active` or `inactive` state.

    UpdateVariableValuesRequest:
      type: object
      required: [updates]
      description: |
        Request body for `UpdateFlowVariableValues`. Only the specified variables are
        updated; others are unaffected.
      properties:
        updates:
          type: array
          description: Variable-value pairs to update.
          items:
            type: object
            required: [id, value]
            description: Single variable value update.
            properties:
              id:
                type: string
                description: ID of the flow-scoped variable to update.
              value:
                type: string
                description: |
                  New value, string-encoded. See `VariableInput.value` for encoding
                  rules per variable `type`.

    # ----------------------------------------------------------------
    # Connection schemas
    # ----------------------------------------------------------------
    AWSConnectionContext:
      type: object
      required: [accountId]
      description: Per-account entry in an AWS connection.
      properties:
        accountId:
          type: string
          description: AWS account ID.
        regions:
          type: array
          items:
            type: string
          description: AWS regions accessible via this account. Empty means all regions.
        status:
          type: string
          description: |
            Per-account permission status. Read-only — assigned by the server:
            management account → `active`; all other accounts → `pending_permissions` on create.

    AWSConnectionConfig:
      type: object
      required: [context, roleName]
      description: AWS-specific connection configuration.
      properties:
        context:
          type: array
          items:
            $ref: "#/components/schemas/AWSConnectionContext"
          description: List of AWS accounts linked to this connection.
        roleName:
          type: string
          description: IAM role name assumed by CloudFlow in each linked account.
        managementAccount:
          type: string
          description: |
            AWS management account ID (payer account). When set, that account receives
            `active` status on create; all other accounts receive `pending_permissions`.
        organizationRootId:
          type: string
          description: AWS Organizations root ID (e.g. `r-xxxx`).
        scopeTargetedOrganizationalUnitIds:
          type: array
          items:
            type: string
          description: OU IDs explicitly included in scope.
        scopeExplicitAccountIds:
          type: array
          items:
            type: string
          description: Account IDs explicitly included in scope.
        scopeExcludedAccountIds:
          type: array
          items:
            type: string
          description: Account IDs explicitly excluded from scope.
        scopeManagementAccountExplicitInScope:
          type: boolean
          description: Whether the management account is explicitly included in scope.
        permissions:
          type: object
          description: IAM permissions granted to the CloudFlow role.
          properties:
            awsManagedPolicies:
              type: array
              items:
                type: string
              description: AWS-managed policy ARNs attached to the role.
            actions:
              type: array
              items:
                type: string
              description: Custom IAM action statements.

    GCPConnectionConfig:
      type: object
      required: [projectId, level, serviceAccountName]
      description: GCP-specific connection configuration.
      properties:
        projectId:
          type: string
          description: GCP project ID that hosts the CloudFlow service account.
        level:
          type: string
          enum: [project, organization, folder]
          description: |
            Binding level of the service account.
            - `project` — access scoped to a single project.
            - `organization` — access scoped to a GCP organization; `organizationId` required.
            - `folder` — access scoped to a GCP folder; `folderId` and `organizationId` required.
        serviceAccountName:
          type: string
          description: Name of the GCP service account (without the `@project.iam.gserviceaccount.com` suffix).
        organizationId:
          type: string
          description: |
            GCP organization ID. Required when `level` is `organization` or `folder`.
        folderId:
          type: string
          description: |
            GCP folder ID. Required when `level` is `folder`.
        predefinedRoles:
          type: array
          items:
            type: string
          description: Predefined GCP IAM roles granted to the service account.
        customRole:
          type: object
          description: Custom IAM role granted to the service account.
          properties:
            roleId:
              type: string
              description: Custom role ID.
            permissions:
              type: array
              items:
                type: string
              description: IAM permissions included in the custom role.

    Connection:
      type: object
      required: [id, name, cloudProvider, status, enabled, createTime, updateTime, etag]
      description: A cloud provider connection resource.
      properties:
        id:
          type: ["string", "null"]
          description: Unique identifier. `null` on dry-run create responses.
        name:
          type: string
          description: Display name.
        description:
          type: ["string", "null"]
          description: Human-readable description.
        cloudProvider:
          $ref: "#/components/schemas/ConnectionProvider"
        status:
          $ref: "#/components/schemas/ConnectionStatus"
        statusMessage:
          type: ["string", "null"]
          description: Human-readable explanation of a non-active status.
        enabled:
          type: boolean
          description: |
            Whether this connection is enabled. Derived from `status`: `false` when
            `status` is `disabled`, `true` otherwise. Toggle via
            `PATCH /connections/{connectionId}` with `{ "enabled": true/false }`.
        awsConfig:
          description: AWS configuration. Present when `cloudProvider` is `AWS`.
          oneOf:
            - $ref: "#/components/schemas/AWSConnectionConfig"
            - type: "null"
        gcpConfig:
          description: GCP configuration. Present when `cloudProvider` is `GCP`.
          oneOf:
            - $ref: "#/components/schemas/GCPConnectionConfig"
            - type: "null"
        createTime:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 (UTC) creation timestamp. `null` on dry-run create.
        updateTime:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 (UTC) last-modified timestamp.
        lastSyncedTime:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 (UTC) timestamp of the last successful sync with the cloud provider.
        etag:
          type: ["string", "null"]
          description: Strong ETag. `null` on dry-run create.

    CreateConnectionRequest:
      type: object
      required: [name]
      description: |
        Request body for `CreateConnection`. Supply exactly one of `gcpConfig` or `awsConfig` —
        the provider is inferred from which field is present. Supplying both returns
        `400 invalid_connection_config`.
      properties:
        id:
          type: string
          description: |
            Client-provided connection ID. Server assigns one if omitted. Providing a
            stable ID enables idempotent creation.
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Unique display name for the connection within the tenant.
        description:
          type: string
          maxLength: 2000
        gcpConfig:
          $ref: "#/components/schemas/GCPConnectionConfig"
          description: GCP configuration. Provide this (and omit `awsConfig`) for a GCP connection.
        awsConfig:
          $ref: "#/components/schemas/AWSConnectionConfig"
          description: AWS configuration. Provide this (and omit `gcpConfig`) for an AWS connection.

    UpdateConnectionRequest:
      type: object
      required: [enabled]
      description: |
        Request body for `UpdateConnection`. Currently supports toggling the `enabled` flag only.
      properties:
        enabled:
          type: boolean
          description: |
            - `true` — enable the connection (transitions `disabled` → `active`).
            - `false` — disable the connection (transitions current status → `disabled`).

    # ----------------------------------------------------------------
    # Template schemas
    # ----------------------------------------------------------------
    Template:
      type: object
      required: [id, name, createTime]
      description: |
        A read-only flow template (blueprint). Use `POST /flows` with `templateId` to
        create a new flow initialised from this template.
      properties:
        id:
          type: string
          description: Unique identifier of the template.
        name:
          type: string
          description: Display name.
        description:
          type: string
          description: Human-readable description.
        instructions:
          type: ["string", "null"]
          description: Operator instructions for flows created from this template.
        createTime:
          type: string
          format: date-time
          description: ISO 8601 (UTC) creation timestamp.
        updateTime:
          type: ["string", "null"]
          format: date-time
          description: ISO 8601 (UTC) last-modified timestamp. `null` if never modified.
