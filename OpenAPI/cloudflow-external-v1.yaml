openapi: 3.1.0

info:
  title: CloudFlow External API
  version: "1.0.0"
  license:
    name: Proprietary
  description: |
    The CloudFlow API lets you automate your cloud operations by building and managing
    workflows programmatically — creating flows, configuring nodes, setting variables,
    and managing cloud provider connections — without needing console access.

    **Authentication**: Bearer token via `Authorization: Bearer <token>`.

    **Tenant resolution**: Pass `X-Tenant-Id` when the authenticated principal can access
    more than one tenant. Omit for single-tenant principals (tenant is resolved from
    token claims).

    **Idempotency**: All side-effecting endpoints (POST/PUT/PATCH/DELETE) require an
    `Idempotency-Key` request header. Retrying with the same key and fingerprint replays
    the original response with an `Idempotency-Replayed: true` header. TTL is 24 h.

    **Optimistic concurrency**: Mutating a flow, connection, or variable requires the
    `If-Match` header containing the ETag from the most recent GET or mutation response.

servers:
  - url: https://api.doit.com
    description: DoiT production API

security:
  - bearerAuth: []

tags:
  - name: Flows
    description: CloudFlow workflow management — create, read, update, delete, publish, and unpublish flows.
  - name: Nodes
    description: Flow node management — create, read, delete, and batch-update nodes within a flow.
  - name: Flow Variables
    description: Per-flow scoped variable management.
  - name: Global Variables
    description: Tenant-scoped global variable management.
  - name: Connections
    description: Cloud provider connection management (AWS and GCP).
  - name: Templates
    description: Read-only catalogue of flow templates (blueprints).

paths:
  # ============================================================
  # Flows
  # ============================================================
  /cloudflow/v1/flows:
    get:
      operationId: ListFlows
      summary: List flows
      description: Returns a cursor-paginated list of flows visible to the authenticated principal.
      tags: [Flows]
      parameters:
        - $ref: "#/components/parameters/MaxResults"
        - $ref: "#/components/parameters/PageToken"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Paginated list of flows.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: CreateFlow
      summary: Create a flow
      description: |
        Creates a new flow. Pass `?templateId=<id>` to initialise the flow from a
        template (blueprint), inheriting its nodes and structure.

        **Dry-run**: Pass `?dryRun=true` to validate the request without persisting. The
        response is `200` with generated fields (`id`, `etag`, `createTime`, `updateTime`)
        set to `null` and the `X-Dry-Run: true` header.
      tags: [Flows]
      parameters:
        - $ref: "#/components/parameters/DryRun"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantId"
        - name: templateId
          in: query
          required: false
          description: |
            ID of a template (blueprint) to initialise the flow from. When supplied the
            new flow inherits the template's node graph and structure. The template itself
            is not modified.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFlowRequest"
      responses:
        "201":
          description: Flow created. `Location` header contains the canonical URL.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"
        "200":
          description: |
            Dry-run response — the operation was validated but no flow was persisted.
            Generated fields (`id`, `etag`, `createTime`, `updateTime`) are `null`.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            X-Dry-Run:
              $ref: "#/components/headers/XDryRun"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /cloudflow/v1/flows/{flowId}:
    get:
      operationId: GetFlow
      summary: Get a flow
      tags: [Flows]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Flow retrieved successfully.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    put:
      operationId: UpdateFlow
      summary: Update a flow
      description: |
        Replaces all mutable fields of a flow with the supplied values. This is a full
        replacement: optional fields absent from the body are reset to their defaults
        (e.g. `instructions` is cleared). Read-only fields (`id`, `status`, `published`,
        `createTime`, `etag`) are ignored if present in the body.

        `If-Match` is required. Obtain the current ETag from a preceding GET or mutation.
      tags: [Flows]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/IfMatchRequired"
        - $ref: "#/components/parameters/DryRun"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFlowRequest"
      responses:
        "200":
          description: Flow updated successfully.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Dry-Run:
              $ref: "#/components/headers/XDryRun"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      operationId: DeleteFlow
      summary: Delete a flow
      description: |
        Permanently deletes a flow and all its nodes. This action is irreversible.
        Returns `204 No Content`. The `ETag` response header reflects the final resource version.
      tags: [Flows]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/IfMatchRequired"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "204":
          description: Flow deleted.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /cloudflow/v1/flows/{flowId}/actions/publish:
    post:
      operationId: PublishFlow
      summary: Publish a flow
      description: |
        Publishes a flow, making it available for scheduled or event-driven execution.
        Validates that all required variables have values and that the flow graph is
        complete before transitioning. Uses conditional validation; dry-run is supported.

        The `published` field on the returned flow will be `true`.
      tags: [Flows]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/IfMatchRequired"
        - $ref: "#/components/parameters/DryRun"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Flow published (or dry-run validated).
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Dry-Run:
              $ref: "#/components/headers/XDryRun"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /cloudflow/v1/flows/{flowId}/actions/unpublish:
    post:
      operationId: UnpublishFlow
      summary: Unpublish a flow
      description: |
        Unpublishes a flow, stopping any scheduled or event-driven execution and performing
        tear-down steps (e.g. clearing the active schedule). The `published` field on the
        returned flow will be `false`.
      tags: [Flows]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/IfMatchRequired"
        - $ref: "#/components/parameters/DryRun"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Flow unpublished (or dry-run validated).
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Dry-Run:
              $ref: "#/components/headers/XDryRun"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # Nodes
  # ============================================================
  /cloudflow/v1/flows/{flowId}/nodes:
    post:
      operationId: CreateNode
      summary: Create a node
      description: |
        Adds a new node to a flow. The optional `transition` field wires the new node to
        an existing parent node. When `If-Match` matches the flow's current ETag, the
        operation is safe against concurrent edits.
      tags: [Nodes]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/IfMatchRequired"
        - $ref: "#/components/parameters/DryRun"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNodeRequest"
      responses:
        "201":
          description: Node created. `Location` header contains the canonical URL.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Node"
        "200":
          description: Dry-run response — node was not created. Generated fields are `null`.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            X-Dry-Run:
              $ref: "#/components/headers/XDryRun"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Node"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /cloudflow/v1/flows/{flowId}/nodes/actions/update-batch:
    post:
      operationId: UpdateNodesBatch
      summary: Batch-update nodes
      description: |
        Atomically adds and updates a batch of nodes in a flow. All changes in the batch
        are applied atomically or not at all.

        This endpoint is intended for AI agents (e.g. Ava) that build or reshape the flow
        graph in a single operation.
      tags: [Nodes]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/IfMatchRequired"
        - $ref: "#/components/parameters/DryRun"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNodesBatchRequest"
      responses:
        "200":
          description: Batch applied. Returns the updated flow with nodes embedded.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
            X-Dry-Run:
              $ref: "#/components/headers/XDryRun"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /cloudflow/v1/flows/{flowId}/nodes/{nodeId}:
    get:
      operationId: GetNode
      summary: Get a node
      tags: [Nodes]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/NodeId"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Node retrieved successfully.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Node"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      operationId: DeleteNode
      summary: Delete a node
      description: |
        Removes a node from a flow. Any transitions pointing to the deleted node are
        also removed. Returns `204 No Content`.
      tags: [Nodes]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/NodeId"
        - $ref: "#/components/parameters/IfMatchRequired"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "204":
          description: Node deleted.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ============================================================
  # Flow Variables
  # ============================================================
  /cloudflow/v1/flows/{flowId}/variables:
    get:
      operationId: ListFlowVariables
      summary: List flow variables
      tags: [Flow Variables]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/MaxResults"
        - $ref: "#/components/parameters/PageToken"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Paginated list of flow-scoped variables.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariableListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      operationId: CreateFlowVariable
      summary: Create a flow variable
      tags: [Flow Variables]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/DryRun"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VariableInput"
      responses:
        "201":
          description: Flow variable created.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Variable"
        "200":
          description: Dry-run response — variable was not created.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            X-Dry-Run:
              $ref: "#/components/headers/XDryRun"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Variable"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    patch:
      operationId: UpdateFlowVariableValues
      summary: Bulk-update flow variable values
      description: |
        Atomically updates the values of one or more flow-scoped variables. The request body
        is an object with an `updates` array of `{ id, value }` pairs; only specified
        variables are updated. Variables not listed are unaffected.
      tags: [Flow Variables]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVariableValuesRequest"
      responses:
        "200":
          description: Variable values updated. Returns the full updated variable list.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariableListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /cloudflow/v1/flows/{flowId}/variables/{variableId}:
    get:
      operationId: GetFlowVariable
      summary: Get a flow variable
      tags: [Flow Variables]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/VariableId"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Flow variable retrieved.
          headers:
            Request-Id:
              $ref: "#/components/headers/RequestId"
            Content-Language:
              $ref: "#/components/headers/ContentLanguage"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Variable"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    put:
      operationId: UpdateFlowVariable
      summary: Update a flow variable
      description: |
        Replaces the definition of a flow-scoped variable. The `name` must remain unique
        within the flow (excluding the current variable). `If-Match` is required.
      tags: [Flow Variables]
      parameters:
        - $ref: "#/components/parameters/FlowId"
        - $ref: "#/components/parameters/VariableId"
        - $ref: "#/components/parameters/IfMatchRequired"
        - $ref: "#/components/parameters/DryRun"
