name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    # Run daily at 5am UTC
    - cron: "0 5 * * *"

# Acceptance tests mutate shared remote resources, so only one run of this
# workflow may execute at a time. A single fixed group key serializes runs
# across all branches/PRs. cancel-in-progress: false queues new runs behind
# the in-progress one instead of cancelling it.
concurrency:
  group: acceptance-tests
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false

      - name: Validate Examples
        run: make validate-examples

  validate-docs:
    name: Validate Docs
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false

      - name: Validate Docs
        run: make validate-docs

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false

      - run: go mod download

      - name: Run Tests
        env:
          TF_ACC: "1"
          DOIT_API_TOKEN: ${{ secrets.DOIT_API_TOKEN }}
          DOIT_HOST: ${{ vars.DOIT_HOST }}
          TEST_USER: ${{ vars.TEST_USER }}
          TEST_ATTRIBUTION: ${{ vars.TEST_ATTRIBUTION }}
          TEST_ATTRIBUTION_GROUP: ${{ vars.TEST_ATTRIBUTION_GROUP }}
          TEST_SLACK_CHAN: ${{ vars.TEST_SLACK_CHAN }}
          TEST_PROJECT: ${{ vars.TEST_PROJECT }}
          TEST_CUSTOMER_ID: ${{ vars.TEST_CUSTOMER_ID }}
          TEST_INVOICE_ID: ${{ vars.TEST_INVOICE_ID }}
          TEST_ANOMALY_ID: ${{ vars.TEST_ANOMALY_ID }}
          TEST_CLOUD_INCIDENT_ID: ${{ vars.TEST_CLOUD_INCIDENT_ID }}
          TEST_COMMITMENT_ID: ${{ vars.TEST_COMMITMENT_ID }}
          TEST_ASSET_ID: ${{ vars.TEST_ASSET_ID }}
          TEST_ASSET_ID_AWS: ${{ vars.TEST_ASSET_ID_AWS }}
          TEST_CLOUD_DIAGRAM_RESOURCE: ${{ vars.TEST_CLOUD_DIAGRAM_RESOURCE }}
          TEST_USER_2: ${{ vars.TEST_USER_2 }}
          TEST_INVITE_EMAIL: ${{ vars.TEST_INVITE_EMAIL }}
          TEST_AWS_ACCOUNT_ID: ${{ vars.TEST_AWS_ACCOUNT_ID }}
          TEST_AWS_ROLE_ARN: ${{ vars.TEST_AWS_ROLE_ARN }}
          TEST_AWS_S3_BUCKET: ${{ vars.TEST_AWS_S3_BUCKET }}
          TEST_AWS_S3_BUCKET_REGION: ${{ vars.TEST_AWS_S3_BUCKET_REGION }}
        run: go test -v -timeout 120m ./...
