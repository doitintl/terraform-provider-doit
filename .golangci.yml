version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Core linters (from HashiCorp template)
    - copyloopvar
    - depguard
    - durationcheck
    - errcheck
    - forcetypeassert
    - godot
    - ineffassign
    - makezero
    - misspell
    - nilerr
    - predeclared
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usetesting
    # Additional linters
    - govet
    - revive
    - gosec
    # Custom Terraform provider linters (tools/linters)
    - diagsuppressed
    - diagdrop
    - structliteral
    - overlayinvariant
    - overlaycheck
    - delete404
    - timeoutcheck
    - read404
    - configuretype
    - errformat
    - listnullread
    - usestatefunknown
    - paralleltest
    - interfacestyle
    - crudnaming
    - constructor
    - newexpr
    - unknownguard
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      # Test file exclusions
      - path: _test\.go
        linters:
          - forcetypeassert
          - unparam
          - gosec
      # Generated model files
      - path: internal/provider/models/
        linters:
          - godot
          - revive
      # OpenAPI generated files
      - path: OpenAPI/
        linters:
          - godot
          - revive
      # Generated schema files — exclude custom linters (schemaparser reads them for facts)
      - path: _gen\.go
        linters:
          - overlaycheck
          - overlayinvariant
          - structliteral
          - delete404
          - timeoutcheck
          - read404
          - errformat
          - listnullread
          - usestatefunknown
          - interfacestyle
          - crudnaming
          - constructor
          - newexpr
          - unknownguard
          - diagdrop
      # Test files — exclude custom linters (except paralleltest which only applies to tests)
      - path: _test\.go
        linters:
          - overlaycheck
          - overlayinvariant
          - delete404
          - timeoutcheck
          - read404
          - configuretype
          - errformat
          - listnullread
          - usestatefunknown
          - interfacestyle
          - crudnaming
          - constructor
          - newexpr
          - unknownguard
          - diagdrop
      # Data sources — exclude resource-only linters
      - path: _data_source\.go
        linters:
          - overlaycheck
          - overlayinvariant
          - delete404
          - read404
          - listnullread
          - usestatefunknown
          - crudnaming
      # Provider config — not a resource, no plan modifiers
      - path: provider\.go
        linters:
          - usestatefunknown
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2/helper/acctest"
              desc: "Use github.com/hashicorp/terraform-plugin-testing/helper/acctest"
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2/helper/resource"
              desc: "Use github.com/hashicorp/terraform-plugin-testing/helper/resource"
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2/terraform"
              desc: "Use github.com/hashicorp/terraform-plugin-testing/terraform"
            - pkg: "github.com/hashicorp/terraform-plugin-sdk/v2"
              desc: "Use Terraform Plugin Framework"
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
    gosec:
      excludes:
        - G101 # Look for hardcoded credentials
        - G404 # Insecure random number source
    custom:
      diagsuppressed:
        type: "module"
        description: "Detects suppressed diag.Diagnostics return values."
      structliteral:
        type: "module"
        description: "Detects direct struct literal construction of generated Terraform Value types."
      overlayinvariant:
        type: "module"
        description: "Ensures Create/Update use overlay functions and Read/ImportState use mapping functions."
      overlaycheck:
        type: "module"
        description: "Validates overlay functions handle all schema fields correctly per their classification."
      delete404:
        type: "module"
        description: "Ensures Delete methods treat HTTP 404 as success."
      timeoutcheck:
        type: "module"
        description: "Ensures CRUD methods use context.WithTimeout."
      read404:
        type: "module"
        description: "Ensures resource Read methods call RemoveResource for externally deleted resources."
      configuretype:
        type: "module"
        description: "Detects mismatched Configure type strings (Data Source vs Resource)."
      errformat:
        type: "module"
        description: "Ensures HTTP error messages include status code and response body."
      listnullread:
        type: "module"
        description: "Flags types.ListNull() in Read paths for Optional/Optional+Computed list attributes."
      usestatefunknown:
        type: "module"
        description: "Ensures Computed-only stable fields have UseStateForUnknown plan modifiers."
      paralleltest:
        type: "module"
        description: "Flags resource.Test() — use resource.ParallelTest() instead."
      interfacestyle:
        type: "module"
        description: "Flags &type{} in interface checks — use (*type)(nil) instead."
      crudnaming:
        type: "module"
        description: "Enforces plan/state variable naming in CRUD methods."
      constructor:
        type: "module"
        description: "Ensures NewXxxResource/DataSource constructors use &type{} style."
      newexpr:
        type: "module"
        description: "Suggests new(expr) instead of temp-variable-then-address pattern."
      unknownguard:
        type: "module"
        description: "Ensures data source Read() checks for unknown inputs before API calls."
      diagdrop:
        type: "module"
        description: "Detects return nil that drops captured diag.Diagnostics variables."
issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
  settings:
    goimports:
      local-prefixes:
        - terraform-provider-doit
    gofmt:
      simplify: true
